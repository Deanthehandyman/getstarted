name: Cleanup Old Generated Files

on:
  workflow_dispatch

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete old generated files
        run: |
          # This deletes files in the root AND inside service-areas/ just to be safe
          rm -f amazon-assembly-*.html box-to-built-*.html ethernet-cabling-*.html handyman-*.html ikea-assembly-*.html moving-reassembly-*.html smart-home-setup-*.html starlink-installation-*.html tv-mounting-service-*.html walmart-assembly-*.html wifi-extender-setup-*.html
          
          # This checks the new folder specifically
          if [ -d "service-areas" ]; then
            rm -f service-areas/*.html
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "chore: cleanup old generated html files"
          git push
