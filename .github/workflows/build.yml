name: Generate Tech Pages
    on:
      push:
        paths:
          - 'generate_tech_pages.py'
          - 'tech-template.html'
      workflow_dispatch:
    jobs:
      build:
        runs-on: ubuntu-latest
        permissions:
          contents: write
        steps:
          - uses: actions/checkout@v3
          - name: Set up Python
            uses: actions/setup-python@v4
            with:
              python-version: '3.x'
          - name: Run script
            run: python generate_tech_pages.py
          - name: Commit and push changes
            run: |
              git config --global user.name 'github-actions[bot]'
              git config --global user.email 'github-actions[bot]@users.noreply.github.com'
              git add .
              git commit -m "Auto-generate Starlink tech pages and update sitemap" || echo "No changes to commit"
              git push
    
